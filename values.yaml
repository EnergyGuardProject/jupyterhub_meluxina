imagePullSecrets:
- name: gitlab-regcred

ingress:
  enabled: false

hub:
  image:
    name: theopnt12/jupyterhub-meluxina
    tag: v4-amd64
  extraEnv:
    SLURM_USER:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: slurm-user
    COMPUTE_HUB_BASE:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: compute-hub-base
    KEYCLOAK_CLIENT_ID:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: keycloak_client_id
    KEYCLOAK_CLIENT_SECRET:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: keycloak_client_secret
    KEYCLOAK_REALM:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: keycloak_realm
    KEYCLOAK_BASE_URL:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: keycloak_base_url
    TOKEN_STORE_URL:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: token-store-url
    TOKEN_STORE_API_KEY:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: token-store-api-key
    # Encrypts auth_state at rest; required because we read the user's email
    # from the OAuth auth_state to resolve their per-user Slurm token.
    JUPYTERHUB_CRYPT_KEY:
      valueFrom:
        secretKeyRef:
          name: meluxina-credentials
          key: jupyterhub-crypt-key

  extraConfig:
    01-custom-config: |
      c.JupyterHub.spawner_class = "slurmrestapispawner.SlurmRESTAPISpawner"

      # Keycloak (OIDC) authentication via GenericOAuthenticator.
      from urllib.parse import urlencode
      from oauthenticator.generic import GenericOAuthenticator
      c.JupyterHub.authenticator_class = GenericOAuthenticator

      # Client is configured with localhost redirect URIs for now.
      _base_url = "http://localhost:8088"

      _keycloak_realm_url = (
          os.environ["KEYCLOAK_BASE_URL"].rstrip("/")
          + "/realms/" + os.environ["KEYCLOAK_REALM"]
          + "/protocol/openid-connect"
      )
      c.GenericOAuthenticator.client_id = os.environ["KEYCLOAK_CLIENT_ID"]
      c.GenericOAuthenticator.client_secret = os.environ["KEYCLOAK_CLIENT_SECRET"]
      c.GenericOAuthenticator.authorize_url = _keycloak_realm_url + "/auth"
      c.GenericOAuthenticator.token_url = _keycloak_realm_url + "/token"
      c.GenericOAuthenticator.userdata_url = _keycloak_realm_url + "/userinfo"
      c.GenericOAuthenticator.oauth_callback_url = _base_url + "/hub/oauth_callback"
      c.GenericOAuthenticator.login_service = "Keycloak"
      c.GenericOAuthenticator.scope = ["openid", "profile", "email"]
      c.GenericOAuthenticator.username_claim = "preferred_username"
      c.GenericOAuthenticator.allow_all = True

      # Persist the OAuth response (encrypted with JUPYTERHUB_CRYPT_KEY) so the
      # spawner can read the user's email and resolve their per-user Slurm token.
      c.GenericOAuthenticator.enable_auth_state = True

      # RP-initiated logout: logging out of JupyterHub also ends the Keycloak
      # SSO session, otherwise the next login silently re-authenticates.
      c.GenericOAuthenticator.logout_redirect_url = (
          _keycloak_realm_url + "/logout?" + urlencode({
              "client_id": os.environ["KEYCLOAK_CLIENT_ID"],
              "post_logout_redirect_uri": _base_url + "/hub/login",
          })
      )

      # Per-user Slurm token: after Keycloak login, resolve the user's email and
      # ask the token-store service for their
      # Slurm token, then supply it to the spawn. If the user has no team token
      # (token store returns 404) the pre_spawn_hook raises and JupyterHub shows
      # a "no HPC access" screen instead of starting a server. Re-checked on
      # every spawn so team membership / token rotations take effect immediately.
      import json
      from urllib.parse import quote
      from tornado import web
      from tornado.httpclient import AsyncHTTPClient, HTTPClientError, HTTPRequest

      _NO_HPC = (
          "You are not a member of a team with access to HPC."
      )

      # MeluXina project directories live under this base; a user's working
      # directory is <base>/<project>/jovyan/work (mirrors the convention in
      # the meluxina-credentials secret's working-directory).
      _PROJECT_HOME_BASE = "/project/home"

      def _working_directory_for(project):
          return f"{_PROJECT_HOME_BASE}/{project}/jovyan/work"

      async def resolve_slurm_token(spawner):
          """Return (slurm_token, meluxina_project_name) for the user.

          Raises web.HTTPError:
          403 -> the user has no team token (no HPC access);
          503 -> the token store itself is unreachable/erroring.
          """
          auth_state = await spawner.user.get_auth_state()
          email = None
          if auth_state:
              email = (auth_state.get("oauth_user") or {}).get("email")
          # Fall back to the Hub username if email is somehow absent.
          username = email or spawner.user.name

          base = os.environ["TOKEN_STORE_URL"].rstrip("/")
          url = base + "/users/" + quote(username, safe="") + "/token"
          req = HTTPRequest(
              url,
              method="GET",
              headers={"X-API-Key": os.environ["TOKEN_STORE_API_KEY"]},
              request_timeout=15,
          )
          try:
              resp = await AsyncHTTPClient().fetch(req)
          except HTTPClientError as e:
              # 400/404 => the service answered: this user has no team token.
              if e.code in (400, 404):
                  spawner.log.warning(
                      "No Slurm token for %s (HTTP %s) - denying HPC access",
                      username, e.code,
                  )
                  raise web.HTTPError(403, _NO_HPC) from e
              # Anything else (5xx, timeout, connection refused) is the token
              # store failing, not a membership decision - say so plainly.
              raise web.HTTPError(
                  503,
                  "The HPC token service is currently unavailable; "
                  "please try again later.",
              ) from e

          body = json.loads(resp.body) or {}
          token = body.get("slurm_token")
          project = body.get("meluxina_project_name")
          if not token or not project:
              # Defensive: a 200 without a token or project still means no HPC
              # access (the project drives the Slurm account and working dir).
              raise web.HTTPError(403, _NO_HPC)
          spawner.log.info(
              "Loaded per-user Slurm token and project %s for %s", project, username
          )
          return token, project

      async def fetch_user_slurm_token(spawner):
          # Authoritative gate right before submission (also covers a direct
          # POST that skips the options-form GET). The user's MeluXina project
          # drives the Slurm account and working directory; both are resolved
          # here and are NOT user-editable in the spawn form.
          token, project = await resolve_slurm_token(spawner)
          spawner.slurm_token = token
          spawner.account = project
          spawner.current_working_directory = _working_directory_for(project)

      c.SlurmRESTAPISpawner.pre_spawn_hook = fetch_user_slurm_token

      c.SlurmRESTAPISpawner.environment = {
          "COMPUTE_HUB_BASE": os.environ["COMPUTE_HUB_BASE"]
      }
      c.SlurmRESTAPISpawner.slurmrestd_url = "https://slurm.cloud.lxp.lu"
      # slurmrestd at slurm.cloud.lxp.lu dropped v0.0.40 (404); it now serves
      # v0.0.41-v0.0.44. Using the newest available.
      c.SlurmRESTAPISpawner.slurm_api_version = "v0.0.44"
      c.SlurmRESTAPISpawner.slurm_user = os.environ["SLURM_USER"]
      # No shared/default token: the per-user token from the token store
      # (set in fetch_user_slurm_token) is the ONLY way a spawn gets a token.
      c.SlurmRESTAPISpawner.partition = "gpu"
      # account and current_working_directory are resolved per-user from the
      # user's MeluXina project in fetch_user_slurm_token (pre_spawn_hook), so
      # they are deliberately NOT set (or exposed in the form) here.
      c.SlurmRESTAPISpawner.qos = "default"
      c.SlurmRESTAPISpawner.time_limit = "02:00:00"
      c.SlurmRESTAPISpawner.start_timeout = 600
      c.SlurmRESTAPISpawner.debug_slurm_api = False
      c.SlurmRESTAPISpawner.debug_show_batch_script = False
      c.SlurmRESTAPISpawner.enable_user_options_form = True

      c.SlurmRESTAPISpawner.prologue = """
      export HOME=$(getent passwd $USER | cut -d: -f6)
      module load Python
      export VENV="$HOME/test_restapi"
      if [[ ! -d $VENV ]]; then
          python3 -m venv $VENV
          source $VENV/bin/activate
          pip install --upgrade pip
          pip install uv
          uv pip install jupyterhub jupyterlab
          uv pip install git+https://github.com/LuxProvide/slurmrestapispawner.git
      fi
      source $VENV/bin/activate
      export REQUESTS_CA_BUNDLE=$HOME/certs/mkcert-ca.crt
      export SSL_CERT_FILE="${REQUESTS_CA_BUNDLE}"
      export CURL_CA_BUNDLE="${REQUESTS_CA_BUNDLE}"
      export JUPYTERHUB_API_URL="${COMPUTE_HUB_BASE}/hub/api"
      export JUPYTERHUB_ACTIVITY_URL="${JUPYTERHUB_API_URL}/users/${JUPYTERHUB_USER}/activity"
      env | grep JUPYTER"""
      #